# configs/evaluation.yaml
# Training configuration for evaluateAnswer task.
# Uses a slightly higher LR and more epochs because
# the evaluation task requires finer rubric-scoring calibration.

base_model: "microsoft/Phi-3-mini-4k-instruct"

# ── LoRA settings ─────────────────────────────────────────────────────────────
lora_r: 32               # higher r for scoring task
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# ── Quantization ──────────────────────────────────────────────────────────────
use_4bit: true
bnb_4bit_compute_dtype: "bfloat16"

# ── Data ──────────────────────────────────────────────────────────────────────
data_path: "data/processed/eval_train.jsonl"
val_path: "data/processed/eval_val.jsonl"
max_seq_length: 2048
packing: false

# ── Training ──────────────────────────────────────────────────────────────────
output_dir: "checkpoints/evaluation"
num_train_epochs: 4                # extra epoch for scoring calibration
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 0.00015             # slightly lower LR for finer calibration
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
weight_decay: 0.01
optim: "paged_adamw_32bit"
fp16: false
bf16: true
logging_steps: 25
save_steps: 200
eval_steps: 200
early_stopping_patience: 3
load_best_model_at_end: true
report_to: "none"
seed: 42

# ── Notes ─────────────────────────────────────────────────────────────────────
# For the evaluateAnswer task, target metrics are:
#   - score Pearson r with human graders: > 0.75
#   - band accuracy: > 80%
#   - rubric recall: > 75%
#
# Include negative examples in eval_train.jsonl:
#   - blank answers (pct=0)
#   - copied answers (pct=65, note flagged)
#   - hallucinated answers (pct=5)
#   - vague answers (pct=20-40)
