# configs/generation.yaml
# Training configuration for generation tasks:
# makeQuestions, makeFlashcards, makeQuiz

# ── Base model ────────────────────────────────────────────────────────────────
# Use Phi-3-mini for budget GPUs (8 GB VRAM min)
# Use Mistral-7B-Instruct-v0.3 for higher quality (12 GB VRAM min)
base_model: "microsoft/Phi-3-mini-4k-instruct"
# base_model: "mistralai/Mistral-7B-Instruct-v0.3"

# ── LoRA settings ─────────────────────────────────────────────────────────────
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# ── Quantization ──────────────────────────────────────────────────────────────
use_4bit: true
bnb_4bit_compute_dtype: "bfloat16"

# ── Data ──────────────────────────────────────────────────────────────────────
data_path: "data/processed/train.jsonl"
val_path: "data/processed/val.jsonl"
max_seq_length: 2048
packing: false

# ── Training ──────────────────────────────────────────────────────────────────
output_dir: "checkpoints/generation"
num_train_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4      # effective batch = 16
learning_rate: 0.0002
lr_scheduler_type: "cosine"
warmup_ratio: 0.03
weight_decay: 0.001
optim: "paged_adamw_32bit"
fp16: false
bf16: true                          # use bfloat16 on Ampere GPUs (A100, 3090 etc)
logging_steps: 25
save_steps: 200
eval_steps: 200
early_stopping_patience: 3
load_best_model_at_end: true

# Set to "wandb" for experiment tracking:
report_to: "none"

seed: 42

# ── Notes ─────────────────────────────────────────────────────────────────────
# Expected training time on A100-40GB:  ~3–4 hours
# Expected training time on RTX 3090:   ~8–10 hours (QLoRA 4-bit)
# Expected training time on T4 (Colab): ~12–16 hours
#
# GPU memory usage:
#   Phi-3-mini + QLoRA 4-bit: ~7 GB
#   Mistral-7B + QLoRA 4-bit: ~11 GB
