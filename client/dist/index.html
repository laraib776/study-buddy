body{
  font-family:'Courier New','Nunito',monospace;color:var(--tx);min-height:100vh;
  background:
    linear-gradient(rgba(255,255,255,.22) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.22) 1px,transparent 1px),
    var(--grad);
  background-size:36px 36px,36px 36px,100% 100%,100% 100%;
  overflow:hidden;
}
body.theme-blue{
  background:
    linear-gradient(rgba(255,255,255,.25) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.25) 1px,transparent 1px),
    radial-gradient(circle at 18% 14%,rgba(248,252,255,.7),transparent 30%),
    linear-gradient(135deg,#D9E9F2,#C8DDF1 46%,#D4E8E4);
}
body.theme-purple{background:var(--grad);}
body.theme-dark{background:var(--grad);}
*{scrollbar-width:none;}
::-webkit-scrollbar{width:0;height:0;display:none}

/* ─── Layout ─── */
#app-shell{display:flex;height:100vh;max-width:1280px;margin:0 auto;background:transparent;padding:14px 16px;position:relative;}

/* Desktop sidebar */
.sidebar{width:184px;background:var(--sidebar-bg);border:3px solid var(--sidebar-border);border-radius:0;display:flex;flex-direction:column;padding:10px 0;position:sticky;top:14px;height:calc(100vh - 28px);z-index:50;overflow:hidden;box-shadow:8px 8px 0 rgba(109,83,100,.22);}
body.theme-blue .sidebar{background:var(--sidebar-bg);}
.s-titlebar{height:28px;background:var(--btn-grad);display:flex;align-items:center;padding:0 10px;gap:5px;flex-shrink:0;margin:-10px 0 10px;}
.s-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.s-dot:nth-child(1){background:#ff6b6b}.s-dot:nth-child(2){background:#ffd166}.s-dot:nth-child(3){background:#6dd97e}
.s-ttl{font-family:'Press Start 2P','Courier New',monospace;font-size:7px;color:rgba(255,255,255,.85);margin-left:5px;letter-spacing:.8px}
.sidebar-brand{padding:0 12px 10px;border-bottom:3px solid rgba(109,83,100,.22);}
.sidebar-brand h1{font-family:'Courier New',monospace;font-size:18px;color:#55724E;font-weight:900;line-height:1.05;font-style:normal;text-transform:uppercase;}
.sidebar-brand p{font-size:9px;color:#8E7C86;margin-top:5px;font-weight:800;}
.user-badge{display:flex;align-items:center;gap:7px;margin-top:8px;background:#FFF9F2;border:2px solid #D8CBBE;padding:5px 6px;font-size:10px;font-weight:900;color:#6D5364;min-width:0;}
.user-badge-initial{width:24px;height:24px;border-radius:50%;background:#F8E5EC;border:2px solid #A65F78;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.user-badge-initial img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.user-badge-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1;}
.sidebar-nav{padding:10px 10px;flex:1;display:flex;flex-direction:column;gap:4px;}
.snav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:0;cursor:pointer;font-size:11px;font-weight:900;color:#816E79;transition:all .18s;margin-bottom:0;border:2px solid transparent;background:none;width:100%;text-align:left;min-height:44px;}
.snav-item:hover{background:#FFF9F2;color:#5C7656;}
.snav-item.active{background:#FFF9F2;color:#55724E;font-weight:900;border-color:#6D5364;box-shadow:4px 4px 0 rgba(109,83,100,.18);}
.snav-icon{width:34px;height:34px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sidebar-footer{padding:8px 10px;}

/* Main content */
.main-content{flex:1;height:calc(100vh - 28px);padding-bottom:0;background:var(--card);border:3px solid #6D5364;border-left:0;border-radius:0;box-shadow:8px 8px 0 rgba(109,83,100,.22);overflow:hidden;position:relative;}
body.theme-blue .main-content{background:var(--card);}
.screen-wrap{max-width:1040px;padding:0;margin:0 auto;height:100%;overflow:hidden;}

/* Mobile nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding:7px 8px 18px;z-index:100;}
.bnav-grid{display:flex;justify-content:space-around;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;border:none;background:none;cursor:pointer;min-width:56px;}
.bnav-icon{width:48px;height:42px;border-radius:0;display:flex;align-items:center;justify-content:center;font-size:19px;transition:all .18s;}
.bnav-item.active .bnav-icon{background:var(--lav-lt);}
.bnav-label{font-size:10px;font-weight:700;color:var(--mu);transition:color .18s;}
.bnav-item.active .bnav-label{color:var(--lav2);}

@media(max-width:768px){
  .sidebar{display:none;}
  .main-content{margin-left:0;}
  .bottom-nav{display:block;}
  .screen-wrap{padding-bottom:80px;}
}
@media(min-width:769px){
  .main-content{padding-top:0;}
  .screen-wrap{padding:14px 24px 112px;}
}

/* ─── Cards & Surfaces ─── */
.card{background:rgba(255,249,242,.94);border-radius:0;border:3px solid #C8B8AA;padding:12px;box-shadow:5px 5px 0 rgba(109,83,100,.14);position:relative;}
.card-sm{background:rgba(255,249,242,.94);border-radius:0;border:3px solid #C8B8AA;padding:10px 12px;}

/* ─── Buttons ─── */
.btn{border:3px solid #6D5364;border-radius:0;padding:10px 18px;cursor:pointer;font-family:'Courier New',monospace;font-weight:900;font-size:12px;transition:all .18s;display:inline-flex;align-items:center;gap:7px;text-transform:uppercase;box-shadow:4px 4px 0 rgba(109,83,100,.18);}
.btn-primary{background:#6D8B62;color:#FFF9F2;}
.btn-primary:hover{transform:translate(1px,1px);box-shadow:2px 2px 0 rgba(109,83,100,.18);}
.btn-mint{background:var(--mint2);color:#FFF9F2;}
.btn-rose{background:var(--rose2);color:#FFF9F2;}
.btn-peach{background:var(--peach2);color:#FFF9F2;}
.btn-outline{background:var(--card);color:var(--tx);border:1.5px solid var(--bd);}
.btn-outline:hover{border-color:var(--lav);background:var(--lav-lt);}
.btn-sm{padding:8px 16px;font-size:12px;}
.btn-block{width:100%;justify-content:center;}

/* ─── Chip / Tag ─── */
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:50px;padding:4px 12px;font-size:11px;font-weight:700;}
.chip-lav{background:var(--lav-lt);color:var(--lav2);}
.chip-mint{background:var(--mint-lt);color:var(--mint2);}
.chip-rose{background:var(--rose-lt);color:var(--rose2);}
.chip-peach{background:var(--peach-lt);color:var(--peach2);}
.chip-sky{background:var(--sky-lt);color:var(--sky2);}

/* ─── Form elements ─── */
input[type=text],input[type=password],input[type=url],textarea,select{
  font-family:'Nunito',sans-serif;font-size:14px;color:var(--tx);
  border:1.5px solid var(--bd);border-radius:var(--rs);
  padding:11px 14px;outline:none;background:var(--card);
  width:100%;transition:border-color .2s;}
input:focus,textarea:focus{border-color:var(--lav2);}
textarea{resize:vertical;}
input[type=file]{display:none;}

/* ─── Navbar (mobile top) ─── */
.topbar{display:none;align-items:center;gap:12px;padding:14px 18px;background:#FFF9F2;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:40;backdrop-filter:blur(16px);}
body.theme-blue .topbar{background:#F8FCFF;}
.topbar h2{font-family:'Courier New',monospace;font-size:18px;color:#55724E;font-weight:900;flex:1;font-style:normal;text-transform:uppercase;}
.back-btn{background:var(--lav-lt);border:3px solid #6D5364;width:34px;height:34px;border-radius:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--lav2);flex-shrink:0;box-shadow:3px 3px 0 rgba(109,83,100,.16);}
.study-timer-floating{position:fixed;top:28px;right:34px;z-index:130;display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,249,242,.94);border:2px solid #6D5364;box-shadow:4px 4px 0 rgba(109,83,100,.18);font-family:'Courier New',monospace;font-weight:900;color:#4B3A46;letter-spacing:0;cursor:pointer;transition:transform .16s ease,box-shadow .16s ease;}
.study-timer-floating:hover{transform:translate(1px,1px);box-shadow:3px 3px 0 rgba(109,83,100,.18);}
.study-timer-time{font-size:14px;min-width:72px;text-align:right;}
.study-start-floating{position:fixed;top:28px;right:34px;z-index:130;display:flex;align-items:center;gap:9px;min-width:142px;padding:9px 11px;background:var(--lav-lt);color:var(--lav3);border:1.5px solid var(--lav);border-radius:13px;box-shadow:0 5px 16px rgba(200,184,218,.3);font-family:'Nunito','Courier New',sans-serif;font-size:11px;font-weight:900;text-align:left;transition:transform .16s ease,box-shadow .16s ease;}
.study-start-floating img{width:32px;height:32px;background:#fff;padding:2px;box-shadow:3px 3px 0 rgba(85,55,73,.12);image-rendering:pixelated;flex:0 0 auto;}
.study-start-floating span{display:block;}
.study-start-floating .start-title{font-size:12px;color:var(--lav3);line-height:1.05;}
.study-start-floating .start-sub{font-size:10px;color:#9B8EBF;margin-top:1px;}
.study-start-floating:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,184,218,.5);}
.desk-title{font-family:'Courier New',monospace;font-size:24px;color:var(--tx);font-weight:900;margin-bottom:6px;}
.desk-sub{font-size:14px;color:var(--mu);margin-bottom:24px;}
@media(max-width:768px){
  .topbar{display:flex;}
  .desk-title,.desk-sub{display:none;}
}

/* ─── Progress bar ─── */
.pbar-wrap{background:var(--bd);border-radius:50px;height:8px;overflow:hidden;}
.pbar{height:100%;border-radius:50px;transition:width .6s ease;}

/* ─── Animations ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastSlide{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.fade-up{animation:none;}
.fade-up{height:100%;overflow:auto;padding-bottom:120px;}
.fade-up,.doc-list{scrollbar-width:auto;}
.fade-up::-webkit-scrollbar,.doc-list::-webkit-scrollbar{display:block;width:8px;height:8px;}
.fade-up::-webkit-scrollbar-thumb,.doc-list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:8px;}
.fade-up::-webkit-scrollbar-track,.doc-list::-webkit-scrollbar-track{background:transparent;}
.doc-list{padding-right:12px!important;margin-right:-10px;scrollbar-gutter:stable;}
.scroll-hint{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:2px solid var(--bd);border-radius:999px;padding:6px 10px;font-size:10px;font-weight:900;color:var(--mu);box-shadow:3px 3px 0 rgba(109,83,100,.12);}
.scroll-hint:before{content:"☁";color:var(--sky2);font-size:13px;}
.pop-in{animation:popIn .3s ease forwards;}

/* ─── Loading screen ─── */
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--bg);}

/* ─── Toast ─── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);border-radius:14px;padding:12px 18px;font-size:13px;font-weight:800;z-index:9999;animation:toastSlide .3s ease;white-space:normal;max-width:min(92vw,560px);overflow:visible;text-align:center;line-height:1.35;box-shadow:0 4px 24px rgba(0,0,0,.15);}
.toast-ok{background:var(--tx);color:white;}
.toast-err{background:var(--rose2);color:white;}

/* ─── Modal overlay ─── */
.overlay{position:fixed;inset:0;background:rgba(30,10,60,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.modal{background:var(--card);border-radius:8px;padding:24px;width:100%;max-width:420px;animation:popIn .3s ease;border:3px solid #6D5364;box-shadow:8px 8px 0 rgba(109,83,100,.2);}
.settings-modal{max-width:min(820px,94vw);max-height:92vh;overflow:hidden;padding:0;display:flex;flex-direction:column;animation:none;}
.settings-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:3px solid var(--bd);background:linear-gradient(135deg,var(--card),var(--lav-lt));flex-shrink:0;}
.settings-head h2{font-family:'Courier New',monospace;font-size:18px;font-weight:900;color:var(--tx);text-transform:uppercase;line-height:1;}
.settings-body{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;overflow:auto;min-height:0;}
.settings-tabs{display:flex;gap:6px;padding:10px 14px 0;flex-wrap:wrap;background:var(--card);}
.settings-tab{border:2px solid var(--bd);background:var(--card);color:var(--mu);font-size:10px;font-weight:900;padding:7px 10px;cursor:pointer;font-family:'Courier New',monospace;text-transform:uppercase;}
.settings-tab.active{background:var(--lav-lt);border-color:var(--lav2);color:var(--lav2);box-shadow:3px 3px 0 rgba(109,83,100,.12);}
.settings-page{padding:12px 14px;overflow:auto;min-height:0;}
.settings-section{border:2px solid var(--bd);background:rgba(255,255,255,.42);padding:10px;border-radius:0;}
.settings-section h3{font-family:'Courier New',monospace;font-size:11px;text-transform:uppercase;color:var(--lav2);margin-bottom:8px;}
.theme-grid,.deco-tray{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.icon-grid{display:flex;flex-wrap:wrap;gap:6px;}
.theme-choice,.icon-choice,.deco-choice{border:2px solid var(--bd);background:var(--card);padding:7px;cursor:pointer;font-family:'Courier New',monospace;font-size:9px;font-weight:900;color:var(--tx);text-transform:uppercase;display:flex;align-items:center;gap:6px;justify-content:center;min-height:36px;}
.icon-choice{width:74px;min-height:34px;}
.theme-choice.active,.icon-choice.active{border-color:var(--lav2);box-shadow:3px 3px 0 rgba(109,83,100,.16);background:var(--lav-lt);}
.theme-card-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
.theme-card{border:2px solid var(--bd);background:rgba(255,255,255,.42);padding:16px 18px;min-height:104px;position:relative;text-align:left;display:flex;flex-direction:column;gap:8px;cursor:pointer;}
.theme-card.active{border-color:var(--rose2);box-shadow:4px 4px 0 rgba(166,95,120,.12);}
.theme-card.active:after{content:"✓";position:absolute;right:12px;top:12px;color:var(--rose2);font-size:18px;font-weight:900;}
.theme-dots{display:flex;gap:8px;}
.theme-dot{width:22px;height:22px;border-radius:50%;border:2px solid rgba(109,83,100,.18);}
.theme-card-title{font-family:'Press Start 2P','Courier New',monospace;font-size:11px;color:var(--tx);}
.theme-card-sub{font-size:11px;color:var(--mu);font-weight:800;}
.icon-row{display:grid;grid-template-columns:130px minmax(0,1fr) 48px;gap:10px;align-items:center;border:2px solid var(--bd);background:rgba(255,255,255,.42);padding:9px;margin-bottom:8px;}
.icon-row label{font-family:'Press Start 2P','Courier New',monospace;font-size:9px;color:var(--tx);}
.icon-preview-img{width:38px;height:38px;object-fit:contain;image-rendering:pixelated;justify-self:center;}
.swatch{width:24px;height:24px;border:2px solid #6D5364;display:inline-block;}
.settings-note{font-size:10px;line-height:1.35;color:var(--mu);font-weight:800;margin-top:7px;}
.settings-actions{display:flex;gap:10px;margin-top:12px;}
.account-name-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:end;margin:8px 0 10px;}
.account-name-row label{display:block;font-size:10px;font-weight:900;color:var(--mu);text-transform:uppercase;margin-bottom:5px;}
.account-name-row input{font-size:13px!important;padding:9px 10px!important;font-weight:900!important;}
.profile-grid{display:grid;grid-template-columns:120px minmax(0,1fr);gap:12px;align-items:start;}
.profile-pic{width:104px;height:104px;border:3px solid var(--bd);background:var(--lav-lt);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:32px;font-weight:900;color:var(--lav2);}
.profile-pic img{width:100%;height:100%;object-fit:cover;}
.profile-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.profile-fields label{display:block;font-size:10px;font-weight:900;color:var(--mu);text-transform:uppercase;margin-bottom:5px;}
.profile-fields textarea{min-height:76px;}
.deco-tray{display:flex;flex-wrap:wrap;gap:10px;border:2px solid #F2BBD2;background:rgba(255,255,255,.36);padding:14px;border-radius:18px;}
.deco-choice{width:42px;height:42px;padding:0;font-size:22px;border-radius:10px;}
.deco-workbox{min-height:94px;border:2px solid #F2BBD2;border-radius:18px;background:rgba(255,255,255,.36);position:relative;margin-top:12px;overflow:hidden;}
.deco-workbox-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--mu);font-size:12px;font-weight:800;}
.deco-workitem{position:absolute;display:flex;align-items:flex-start;gap:2px;cursor:grab;}
.deco-workitem img{width:var(--s,54px);height:var(--s,54px);object-fit:contain;image-rendering:pixelated;filter:drop-shadow(3px 3px 0 rgba(79,67,80,.16));}
.deco-emoji{font-size:var(--s,54px);line-height:1;filter:drop-shadow(3px 3px 0 rgba(79,67,80,.16));}
.deco-mini-btn,.decor-del{width:22px;height:22px;border:2px solid #6D5364;background:#FFF9F2;color:#A65F78;font-family:'Courier New',monospace;font-weight:900;cursor:pointer;line-height:1;}
.decor-wrap{position:absolute;pointer-events:auto;display:flex;align-items:flex-start;gap:2px;}
.decor-wrap img{width:var(--s,54px);height:var(--s,54px);object-fit:contain;image-rendering:pixelated;filter:drop-shadow(3px 3px 0 rgba(79,67,80,.16));cursor:grab;}
.decor-wrap .deco-emoji{cursor:grab;}
.decor-del{opacity:0;transition:opacity .15s;}
.decor-wrap:hover .decor-del{opacity:1;}
.app-decorations{position:absolute;inset:0;pointer-events:none;z-index:30;}
.decor-item{position:absolute;width:54px;height:54px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(3px 3px 0 rgba(79,67,80,.16));}
@media(max-width:720px){.settings-body{grid-template-columns:1fr}.settings-modal{max-height:92vh}.settings-head h2{font-size:16px}.theme-grid,.icon-grid,.deco-tray{grid-template-columns:1fr}.profile-grid,.profile-fields,.theme-card-grid,.icon-row{grid-template-columns:1fr}}

/* ─── Flip card ─── */
.flip-scene{perspective:900px;min-height:200px;cursor:pointer;margin-bottom:18px;}
.flip-card{position:relative;width:100%;height:200px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.flip-card.flipped{transform:none;}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.flip-front{background:var(--card);border:1.5px solid var(--bd);}
.flip-back{background:linear-gradient(135deg,var(--lav-lt),#F3EAFF);border:1.5px solid var(--lav);display:none;}
.flip-card.flipped .flip-front{display:none;}
.flip-card.flipped .flip-back{display:flex;}

/* Focused flashcard drill */
.card-drill-shell{display:grid;justify-items:center;padding:10px 0 24px;perspective:1100px;}
.card-drill-phone{width:min(360px,100%);background:linear-gradient(180deg,#6f5fe6 0%,#3a31b8 100%);border-radius:8px;padding:18px;color:#fff;box-shadow:0 24px 70px rgba(58,49,184,.24);animation:phonePop .42s cubic-bezier(.2,.9,.2,1);}
.card-drill-top{height:42px;display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:10px;font-family:'Courier New',monospace;font-size:12px;font-weight:900;color:rgba(255,255,255,.86);}
.card-drill-top strong{font-size:11px;color:rgba(255,255,255,.72);}
.card-back-btn{width:30px;height:30px;border:0;background:transparent;color:#fff;font-size:26px;line-height:1;font-family:Georgia,serif;opacity:1;}
.card-back-btn:disabled{opacity:.32;}
.card-drill-card{position:relative;width:100%;height:300px;border:0;background:transparent;color:#2D1B5A;padding:0;text-align:center;transform-style:preserve-3d;animation:cardSlideIn .38s cubic-bezier(.2,.9,.2,1);outline:none;}
.card-drill-card:hover .card-flip-inner{transform:translateY(-3px);}
.card-drill-card:active .card-flip-inner{transform:scale(.985);}
.card-flip-inner{position:absolute;inset:0;display:block;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .18s ease;filter:drop-shadow(0 14px 26px rgba(26,18,92,.28));}
.card-face{position:absolute;inset:0;border-radius:8px 8px 18px 18px;background:#fff;padding:44px 22px 52px;display:grid;align-content:center;justify-items:center;gap:14px;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;overflow:hidden;transition:transform .62s cubic-bezier(.2,.8,.2,1),opacity .18s ease;}
.card-face:before{content:"";position:absolute;inset:auto 18px 16px 18px;height:4px;background:linear-gradient(90deg,rgba(143,126,240,.14),rgba(119,200,107,.28),rgba(255,101,121,.18));animation:hintGlow 1.8s ease-in-out infinite;}
.card-face-front{transform:rotateY(0deg);opacity:1;}
.card-face-back{transform:rotateY(180deg);background:linear-gradient(180deg,#fff 0%,#f6fff4 100%);opacity:0;}
.card-drill-card.is-answer .card-face-front{transform:rotateY(-180deg);opacity:0;}
.card-drill-card.is-answer .card-face-back{transform:rotateY(0deg);opacity:1;}
.card-tap-ring{position:absolute;inset:12px;border:1px solid rgba(255,255,255,.26);border-radius:12px;pointer-events:none;animation:ringPulse 2.2s ease-in-out infinite;z-index:2;}
.card-speaker{position:absolute;right:18px;top:16px;color:#8F7EF0;font-size:16px;font-weight:900;}
.card-face-back .card-speaker{color:#77c86b;}
.card-drill-label{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:#2D1B5A;line-height:1.1;}
.card-face-back .card-drill-label{color:#6D8B62;}
.card-drill-text{max-width:28ch;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:#776c8d;line-height:1.55;overflow-wrap:anywhere;}
.card-tap-hint{position:absolute;left:0;right:0;bottom:24px;font-family:'Courier New',monospace;font-size:10px;font-weight:900;text-transform:uppercase;color:#b19be8;letter-spacing:.04em;}
.card-drill-actions{height:58px;display:grid;grid-template-columns:1fr 1fr;background:#fff;border-top:1px solid rgba(35,28,75,.08);border-radius:0 0 18px 18px;overflow:hidden;transform:translateY(-1px);box-shadow:0 12px 24px rgba(26,18,92,.12);}
.card-mark{border:0;background:#fff;font-size:24px;font-weight:900;font-family:'Nunito',sans-serif;transition:transform .16s ease,background-color .16s ease;}
.card-mark:hover{transform:scale(1.08);}
.card-mark:active{transform:scale(.94);}
.card-mark+.card-mark{border-left:1px solid rgba(35,28,75,.08);}
.card-mark-no{color:#ff6579;}
.card-mark-no:hover{background:#fff1f4;}
.card-mark-yes{color:#77c86b;}
.card-mark-yes:hover{background:#f3fff0;}
.card-drill-note{margin-top:18px;padding:14px;border-radius:8px;background:rgba(255,255,255,.13);display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;}
.card-drill-note p{font-size:12px;line-height:1.45;color:rgba(255,255,255,.88);font-weight:800;}
.card-skip{border:1px solid rgba(255,255,255,.38);background:rgba(255,255,255,.14);color:#fff;border-radius:999px;padding:7px 12px;font-size:11px;font-weight:900;font-family:'Courier New',monospace;transition:transform .16s ease,background-color .16s ease;}
.card-skip:hover{background:rgba(255,255,255,.22);transform:translateY(-1px);}
@keyframes phonePop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cardSlideIn{from{opacity:0;transform:translateX(32px) rotateZ(1deg)}to{opacity:1;transform:translateX(0) rotateZ(0)}}
@keyframes ringPulse{0%,100%{opacity:.28;transform:scale(.985)}50%{opacity:.62;transform:scale(1)}}
@keyframes hintGlow{0%,100%{opacity:.36;transform:scaleX(.84)}50%{opacity:1;transform:scaleX(1)}}

/* ─── Viva chat ─── */
.chat-ex{background:var(--card);border:1px solid var(--bd);border-radius:18px 18px 18px 4px;padding:12px 16px;max-width:84%;align-self:flex-start;}
.chat-st{background:linear-gradient(135deg,var(--lav-lt),#EDE7FF);border:1px solid var(--lav);border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:84%;align-self:flex-end;}
.chat-role{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.chat-text{font-size:13px;color:var(--tx);line-height:1.55;}

/* ─── Calendar ─── */
.calendar-board{background:var(--card);border:3px solid var(--pk2);box-shadow:7px 7px 0 rgba(109,83,100,.13);padding:0!important;overflow:hidden;}
.calendar-cats{height:34px;background:linear-gradient(90deg,var(--pk-lt),var(--lav-lt));display:flex;align-items:flex-end;justify-content:space-around;padding:0 12px;border-bottom:3px solid var(--bd);overflow:hidden;}
.cat-tab{width:48px;height:28px;border:3px solid #A9878A;border-bottom:0;border-radius:24px 24px 8px 8px;background:var(--cat,#F8D79A);position:relative;box-shadow:3px 0 0 rgba(166,95,120,.1);}
.cat-tab:before,.cat-tab:after{content:"";position:absolute;top:-6px;width:14px;height:14px;background:var(--cat,#F8D79A);border-left:3px solid #A9878A;border-top:3px solid #A9878A;transform:rotate(45deg);}
.cat-tab:before{left:7px}.cat-tab:after{right:7px}
.cat-eye{position:absolute;top:14px;width:4px;height:4px;background:#5C4A4E;border-radius:50%;}
.cat-eye.l{left:17px}.cat-eye.r{right:17px}
.cat-tab .nose{position:absolute;top:19px;left:50%;width:5px;height:4px;background:#D57C8E;border-radius:50%;transform:translateX(-50%);}
.calendar-titlebar{display:grid;grid-template-columns:38px minmax(0,1fr) 38px;align-items:center;background:var(--btn-grad);color:white;border-bottom:3px solid var(--bd);min-height:38px;}
.calendar-titlebar h3{font-family:'Courier New',monospace;font-size:clamp(14px,2.2vw,20px);font-weight:900;text-align:center;text-transform:uppercase;letter-spacing:1px;text-shadow:2px 2px 0 rgba(109,83,100,.18);}
.calendar-titlebar:after{content:"";display:none;}
.calendar-titlebar .back-btn{width:38px;height:38px;border:0;background:rgba(255,255,255,.25);color:white;font-size:24px;font-weight:900;cursor:pointer;font-family:'Courier New',monospace;box-shadow:none;}
.calendar-titlebar .back-btn:hover{background:rgba(255,255,255,.42);transform:none;}
.calendar-notes-label{font-family:'Courier New',monospace;font-size:12px;font-weight:900;color:#FFF9F2;text-transform:uppercase;justify-self:start;padding-left:10px;}
.cal-nav-btn{width:38px;height:38px;border:0;background:rgba(255,255,255,.25);color:white;font-size:24px;font-weight:900;cursor:pointer;font-family:'Courier New',monospace;}
.cal-nav-btn:hover{background:rgba(255,255,255,.42);}
.cal-week-grid,.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-week-grid{background:var(--pk-md);border-bottom:2px solid var(--bd);}
.cal-week-grid div{text-align:center;font-size:10px;font-weight:900;color:var(--tx);padding:5px 0;text-transform:uppercase;border-right:1px solid var(--bd);}
.cal-week-grid div:last-child{border-right:0;}
.cal-grid{gap:0;background:var(--pk-md);grid-auto-rows:minmax(42px,1fr);overflow:visible;}
.cal-empty,.cal-cell{min-height:42px;height:clamp(42px,7.2vh,58px);border:0;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);background:var(--card);}
.cal-cell{display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;padding:5px 6px;cursor:pointer;transition:background .15s,box-shadow .15s;position:relative;text-align:left;overflow:visible;z-index:1;}
.cal-cell:has(.cal-mini-note){z-index:5;}
.cal-cell:hover{background:var(--pk-lt);box-shadow:inset 0 0 0 2px var(--pk2);z-index:9;}
.cal-cell.today{background:var(--peach-lt);}
.cal-cell.selected{background:var(--lav-lt);box-shadow:inset 0 0 0 3px var(--pk2);z-index:10;}
.cal-cell.selected .cal-num{color:var(--pk2);font-weight:900;}
.cal-num{font-size:12px;font-weight:900;color:var(--tx);line-height:1;}
.cal-dot{display:none;}
.cal-pin{position:absolute;left:50%;top:4px;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 34% 28%,#fff 0 13%,var(--rose-lt) 14% 28%,var(--rose2) 29% 100%);border:2px solid var(--tx);box-shadow:2px 3px 0 rgba(79,67,80,.22),inset -2px -2px 0 rgba(80,20,50,.18);transform:translateX(-50%) rotate(-8deg);z-index:24;}
.cal-pin:after{content:"";position:absolute;left:50%;top:11px;width:3px;height:10px;background:linear-gradient(#6b5262,#2f2630);box-shadow:1px 0 0 rgba(255,255,255,.35);transform:translateX(-50%) rotate(12deg);transform-origin:top center;}
.cal-mini-note{position:absolute;left:50%;top:14px;width:min(42px,calc(100% - 14px));aspect-ratio:1/1;background:var(--peach-lt);border:2px solid var(--peach2);box-shadow:4px 4px 0 rgba(109,83,100,.16);padding:12px 4px 4px;font-size:9px;font-weight:900;color:var(--peach3);line-height:1.08;overflow:hidden;transform:translateX(-50%) rotate(-1deg);z-index:12;pointer-events:none;}
.cal-mini-note:before{content:"";position:absolute;inset:4px;border-top:1px solid rgba(232,144,56,.22);pointer-events:none;}
.sticky-editor{position:relative;background:var(--peach-lt);border:3px solid var(--peach2);border-radius:0;padding:32px 18px 18px;box-shadow:7px 7px 0 rgba(109,83,100,.18);min-height:170px;overflow:visible;}
.sticky-editor:before{content:"";position:absolute;left:50%;top:-28px;width:22px;height:64px;border:5px solid #658C98;border-left-color:#F09AAA;border-radius:18px;transform:translateX(-50%) rotate(-16deg);background:transparent;}
.sticky-editor:after{content:"";position:absolute;right:-18px;top:-15px;width:74px;height:42px;background:#FFF9F2;border:3px solid #D8CBBE;border-radius:50%;box-shadow:-330px 120px 0 -8px #FFF9F2;}
.sticky-editor textarea{background:rgba(255,255,255,.72)!important;border:2px dashed rgba(109,83,100,.34)!important;min-height:86px;font-weight:900;color:var(--tx);}
.calendar-detail-card{background:linear-gradient(135deg,var(--card),var(--pk-lt))!important;border-color:var(--pk2)!important;}
.cal-note-box{background:linear-gradient(135deg,var(--lav-lt),var(--sky-lt));border:3px solid var(--lav);padding:11px;margin-top:10px;}
.cal-note-title{font-family:'Courier New',monospace;font-size:10px;color:var(--tx);font-weight:900;margin-bottom:10px;text-transform:uppercase;}
.cal-note-label{display:block;font-size:8px;font-family:'Press Start 2P','Courier New',monospace;color:var(--mu);margin-bottom:5px;}
.cal-note-display{padding:8px 10px;border-radius:var(--rs);font-size:12px;font-family:'Nunito','Courier New',sans-serif;font-weight:800;margin-bottom:6px;line-height:1.35;overflow-wrap:anywhere;}
.cal-note-display.done{background:var(--mint-lt);border:2px solid var(--mint2);color:var(--mint2);text-decoration:line-through;}
.cal-note-display.deleted{background:var(--rose-lt);border:2px solid var(--rose2);color:var(--rose2);text-decoration:line-through;opacity:.65;}
.cal-note-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.cal-pill{padding:5px 10px;border-radius:50px;border:2px solid var(--bd);background:var(--card);color:var(--mu);font-size:10px;font-weight:900;transition:all .15s;cursor:pointer;}
.cal-pill.done{border-color:var(--mint2);background:var(--mint-lt);color:var(--mint2);}
.cal-pill.del{border-color:var(--rose2);background:var(--rose-lt);color:var(--rose2);}
.note-paster{background:var(--card);border:3px solid var(--pk2);box-shadow:6px 6px 0 rgba(109,83,100,.13);padding:10px;margin-bottom:10px;display:grid;grid-template-columns:minmax(150px,.35fr) minmax(220px,1fr) auto;gap:10px;align-items:end;}
.note-paster label{display:block;font-size:10px;font-weight:900;color:#7E6075;text-transform:uppercase;margin-bottom:5px;}
.note-paster input,.note-paster textarea{font-weight:900!important;}
.note-paster textarea{min-height:42px!important;resize:none;}
@media(max-width:860px){.note-paster{grid-template-columns:1fr}.note-paster .btn{width:100%;justify-content:center}}
.cal-num{font-size:13px;font-weight:900;color:var(--tx);}
.cal-dot{width:6px;height:6px;border-radius:0;margin-top:2px;}

/* ─── Progress ring ─── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}

/* ─── Skeleton ─── */
.skel{background:linear-gradient(90deg,var(--bd) 25%,var(--lav-lt) 50%,var(--bd) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}

/* ─── Quiz options ─── */
.q-opt{width:100%;text-align:left;padding:11px 15px;margin-bottom:7px;border:1.5px solid var(--bd);border-radius:var(--rs);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--tx);background:var(--card);transition:all .15s;}
.q-opt:hover{border-color:var(--lav);background:var(--lav-lt);}
.q-opt.sel{border-color:var(--lav2);background:var(--lav-lt);color:var(--lav2);}

    className:`asset-img ${cls}`.trim(),
    src:imgSrc,
    alt,
    style,
    'data-original-src':imgSrc,
    loading:'eager',
    decoding:'async',
    onError:ev=>{
      const img=ev.currentTarget;
      const original=img.dataset.originalSrc||img.src;
      img.onerror=null;
      img.style.visibility='hidden';

      if(!img.dataset.publicRetry){
        img.dataset.publicRetry='true';
        const publicSrc=original.includes('/public/')
          ? assets.book
          : original.includes('/assets/images/')
            ? original.replace('/assets/images/','/public/assets/images/')
            : new URL(`public/${original}`,document.baseURI).href;
        img.src=publicSrc;
        return;
      }

      if(img.src!==assets.book){
        img.src=assets.book;
      } else {
        img.style.display='none';
      }
    },
    onLoad:ev=>{
      ev.currentTarget.style.visibility='visible';
    },
    ...rest
  });
};

};

async function callFirebaseAI(prompt,sys,tools=null){
  initFirebase();
  const functions=window.firebase?.functions?.();
  if(!functions)throw new Error('Firebase Functions unavailable');
  if(window.STUDYBUDDY_USE_FUNCTIONS_EMULATOR&&!functions._studyBuddyEmulator){
    functions.useEmulator('localhost',5001);
    functions._studyBuddyEmulator=true;
  }
  const callable=functions.httpsCallable('studyBuddyAi');
  const result=await callable({prompt,system:sys,tools:tools||null});
  const data=result?.data||{};
  if(typeof data==='string')return data;
  if(typeof data.text==='string')return data.text;
  if(Array.isArray(data.content))return data.content.map(b=>b.text||"").filter(Boolean).join("");
  throw new Error('Empty AI response');
}
async function callClaude(prompt,sys="You are StudyBuddy AI, a helpful study assistant.",tools=null){
  const apiBase=getApiBase();
  const useFirebaseFunctions=window.STUDYBUDDY_USE_FIREBASE_AI&&window.firebase?.functions&&!apiBase;
  if(useFirebaseFunctions){
    try{
      return await callFirebaseAI(prompt,sys,tools);
    }catch(err){
      if(!apiBase)throw new Error("BACKEND_REQUIRED");
      console.warn('Firebase Functions AI failed, falling back to local proxy.',err);
    }
  }
  const headers={"Content-Type":"application/json"};
  const body={prompt,system:sys};
  if(tools)body.tools=tools;
  let r;
  try{
    r=await fetch(`${apiBase}/api/claude`,{method:"POST",headers,body:JSON.stringify(body)});
  }catch(err){
    if(window.firebase?.functions){
      try{return await callFirebaseAI(prompt,sys,tools);}
      catch(fnErr){console.warn('Firebase Functions AI fallback failed.',fnErr);}
    }
    throw new Error("BACKEND_REQUIRED");
  }
  if(!r.ok){
    let msg="API error";
    try{const d=await r.json();msg=d.error?.message||d.error||d.details||msg;}catch{}
    if(window.firebase?.functions){
      try{return await callFirebaseAI(prompt,sys,tools);}
      catch(fnErr){console.warn('Firebase Functions AI fallback failed.',fnErr);}
    }
    if(r.status===401||r.status===403||r.status===500)throw new Error("BACKEND_REQUIRED");
    throw new Error(msg);
  }
  const d=await r.json();
  const text=(
    (typeof d.text==='string'?d.text:'')||
    d.data?.text||
    (Array.isArray(d.content)?d.content.map(b=>b.text||"").filter(Boolean).join(""):'')||
    (typeof d.message==='string'?d.message:'')
  ).trim();
  if(text)return text;
  throw new Error('Empty AI response');
}

function extractBalancedJson(text,start){
  const open=text[start],close=open==='['?']':'}';
  let depth=0,inStr=false,esc=false;
  for(let i=start;i<text.length;i++){
    const ch=text[i];
    if(inStr){
      if(esc)esc=false;
      else if(ch==='\\')esc=true;
      else if(ch==='"')inStr=false;
      continue;
    }
    if(ch==='"')inStr=true;
    else if(ch===open)depth++;
    else if(ch===close&&--depth===0)return text.slice(start,i+1);
  }
  return '';
}
function parseJ(s){
  const clean=String(s||'')
    .replace(/^\uFEFF/,'')
    .replace(/```(?:json)?/gi,'')
    .replace(/```/g,'')
    .replace(/[“”]/g,'"')
    .replace(/[‘’]/g,"'")
    .trim();
  const candidates=[clean];
  for(let i=0;i<clean.length;i++){
    if(clean[i]==='['||clean[i]==='{'){
      const json=extractBalancedJson(clean,i);
      if(json)candidates.push(json);
    }
  }
  for(const candidate of candidates){
    const repairs=[
      candidate,
      candidate.replace(/,\s*([}\]])/g,'$1'),
      candidate.replace(/([{,]\s*)([A-Za-z_][A-Za-z0-9_]*)\s*:/g,'$1"$2":').replace(/,\s*([}\]])/g,'$1')
    ];
    for(const text of repairs){
      try{return JSON.parse(text);}catch{}
    }
  }
  return null;
}
function normalizeCards(value,topic='Study'){
  const source=Array.isArray(value)?value:(value?.cards||value?.flashcards||value?.items||[]);
  return Array.isArray(source)?source.map(card=>({
    front:String(card?.front||card?.q||card?.question||card?.term||'').trim(),
    back:String(card?.back||card?.a||card?.answer||card?.definition||'').trim(),
    tag:String(card?.tag||card?.category||topic||'Study').trim(),
    difficulty:/^(easy|medium|hard)$/i.test(card?.difficulty||'')?String(card.difficulty).toLowerCase():'medium'
  })).filter(card=>card.front&&card.back):[];
}
function normalizeQuiz(q){
  if(!q||typeof q!=='object')return null;
  const source=q.quiz||q.questions||q.data||q;
  const ansIndex=(ans,opts)=>{
    if(Number.isInteger(ans)&&ans>=0&&ans<opts.length)return ans;
    const text=String(ans??'').trim();
    const letter=/^[A-D]$/i.test(text)?text.toUpperCase().charCodeAt(0)-65:-1;
    if(letter>=0&&letter<opts.length)return letter;
    const exact=opts.findIndex(o=>String(o).trim().toLowerCase()===text.toLowerCase());
    return exact>=0?exact:0;
  };
  const mcq=Array.isArray(source.mcq)?source.mcq.map(x=>({...x,opts:x.opts||x.options||x.choices})).filter(x=>x&&Array.isArray(x.opts)&&x.opts.length>=2).map(x=>({
    q:String(x.q||x.question||'Question'),
    opts:x.opts.slice(0,4).map(o=>String(o)),
    ans:ansIndex(x.ans??x.answer??x.correct??x.correctAnswer,x.opts),
    exp:String(x.exp||x.explanation||'')
  })):[];
  const tf=Array.isArray(source.tf||source.trueFalse)?(source.tf||source.trueFalse).map(x=>({
    q:String(x?.q||x?.question||x?.statement||'Statement'),
    ans:typeof (x?.ans??x?.answer)==='string'?/true|yes|correct/i.test(x.ans??x.answer):!!(x?.ans??x?.answer),
    exp:String(x?.exp||x?.explanation||'')
  })):[];
  const short=Array.isArray(source.short||source.shortAnswer)?(source.short||source.shortAnswer).map(x=>({
    q:String(x?.q||x?.question||'Question'),
    ans:String(x?.ans||x?.answer||'')
  })):[];
  const blanks=Array.isArray(source.blanks||source.fillBlanks||source.fillInTheBlank)?(source.blanks||source.fillBlanks||source.fillInTheBlank).map(x=>({
    q:String(x?.q||x?.question||'Fill in the blank'),
    ans:String(x?.ans||x?.answer||''),
    exp:String(x?.exp||x?.explanation||'')
  })):[];
  return mcq.length||tf.length||short.length||blanks.length?{mcq,tf,short,blanks}:null;
}
function fmt(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sc=s%60;return h>0?`${h}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`:`${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;}
function fmtClock(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sc=s%60;return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;}
function dateKey(date=new Date()){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;}

// ─── File extractors ───
async function extractFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='txt'||ext==='md')return await file.text();
  if(ext==='pdf'){
    try{
      const src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      if(window.pdfjsLib){
        window.pdfjsLib.GlobalWorkerOptions.workerSrc=src;
        const ab=await file.arrayBuffer();
        const pdf=await window.pdfjsLib.getDocument({data:ab}).promise;
        let t='';
        for(let i=1;i<=Math.min(pdf.numPages,30);i++){
          const pg=await pdf.getPage(i);
          const ct=await pg.getTextContent();
          t+=ct.items.map(x=>x.str).join(' ')+'\n';
        }
        return t.trim()||`[PDF: ${file.name} — no extractable text. Paste content below.]`;
      }
    }catch(err){console.warn('PDF err',err);}
    return`[PDF: ${file.name} — paste content below]`;
  }
  if(ext==='docx'){
    try{
      if(window.mammoth){const ab=await file.arrayBuffer();const r=await window.mammoth.extractRawText({arrayBuffer:ab});return r.value||`[DOCX: ${file.name}]`;}
    }catch{}
    return`[DOCX: ${file.name} — paste content below]`;
  }
  if(ext==='pptx'){
    try{
      if(window.JSZip){
        const zip=await window.JSZip.loadAsync(file);
        const slides=Object.keys(zip.files).filter(n=>/ppt\/slides\/slide\d+\.xml/.test(n)).sort((a,b)=>{
          const na=parseInt(a.match(/slide(\d+)/)[1]),nb=parseInt(b.match(/slide(\d+)/)[1]);return na-nb;});
        let t='';
        for(const n of slides){
          const xml=await zip.files[n].async('text');
          const ms=xml.match(/<a:t>([^<]*)<\/a:t>/g)||[];
          const txt=ms.map(x=>x.replace(/<\/?a:t>/g,'')).filter(Boolean).join(' ');
          if(txt.trim())t+='[Slide] '+txt.trim()+'\n';
        }
        return t.trim()||`[PPTX: ${file.name} — no text found]`;
      }
    }catch{}
    return`[PPTX: ${file.name} — paste content below]`;
  }
  return`[${ext.toUpperCase()}: ${file.name} — paste content below]`;
}

  const ghostMetrics=()=>{

    const mobile=window.matchMedia&&window.matchMedia('(max-width:768px)').matches;
    const width=mobile?82:92;
    const rect=host?host.getBoundingClientRect():{width:window.innerWidth||900};
    const edge=mobile?10:18;
    return {left:edge,right:Math.max(edge,rect.width-width-edge),width};

  const triggerGhostWhoosh=(mode='turn')=>{
    const g=ghostRef.current;
    if(g.state==='whoosh'||g.state==='hidden')return;
    if(mode==='hide')playGhostWhoosh();
    g.state='whoosh';
    setGhostHidden(true);

          g.state='moving';
          g.last=performance.now();
          setGhostHidden(false);

        },10000);
      }else{

        syncGhostView();
      }

  };
  useEffect(()=>{
    const g=ghostRef.current;
    const init=()=>{
      const m=ghostMetrics();
      if(!g.initialized){
        g.x=m.right;
        g.initialized=true;
      }else{
        g.x=Math.max(m.left,Math.min(m.right,g.x));
      }
      syncGhostView();
    };
    init();
    const tick=now=>{
      const m=ghostMetrics();
      if(g.state==='moving'&&!g.hovered&&!(focusOn||screen==='focus')&&!companionsDocked){
      const dt=Math.min(.05,((now-(g.last||now))/1000));
      const speed=78;
      g.x+=g.dir*speed*dt;
      if(g.dir<0&&g.x<=m.left){

        triggerGhostWhoosh('turn');

  const makeSubjectiveQuestions=source=>{
    const text=String(source?.notes||'').replace(/\s+/g,' ').trim();
    const cleanPromptSeed=s=>String(s||'')
      .replace(/^TECHNICAL\s+INTERVIEW\s*[—-].*?\d+\)\s*/i,'')
      .replace(/\bAnswer\s*[:：][\s\S]*$/i,'')
      .replace(/[“"'].*$/,'')
      .replace(/\bStrategic\s+Answers?\b[\s\S]*$/i,'')
      .replace(/^\d+\)\s*/,'')
      .trim();
    const questionTitle=s=>cleanPromptSeed(s)
      .replace(/\?[\s\S]*$/,'?')
      .replace(/\s+/g,' ')
      .slice(0,90)
      .trim();
    const candidateChunks=text
      .split(/(?=\b\d+\)\s+)|(?<=[.!?])\s+/)
      .map(s=>({prompt:questionTitle(s),answer:s.trim()}))
      .filter(s=>s.prompt.length>20&&s.prompt.length<180&&s.answer.length>45)
      .slice(0,8);
    const topic=source?.topic||'this topic';
    const seeds=candidateChunks.length?candidateChunks:[{prompt:`Review a key idea in ${topic}.`,answer:text.slice(0,260)||`Review the key ideas in ${topic}.`}];
    return seeds.slice(0,5).map((s,i)=>({
      q:[
        s.prompt.endsWith('?') ? s.prompt : `Explain ${s.prompt} in your own words.`,
        `Why is this important in ${topic}? Use details from your notes.`,
        `Write a short answer about ${s.prompt}.`,
        `What would you remember for an exam about ${s.prompt}?`,
        `Summarize the main idea behind ${s.prompt}.`
      ][i%5],
      ans:s.answer
    }));
  };
  const scoreSubjectiveAnswer=(student,model)=>{
    const stop=new Set(['the','a','an','and','or','but','is','are','was','were','to','of','in','on','for','with','as','by','this','that','it','its','be','from','at','your','you','i','my','we','our','about','into','can','should','would','could']);
    const words=s=>String(s||'').toLowerCase().match(/[a-z0-9]{3,}/g)?.filter(w=>!stop.has(w))||[];
    const expected=[...new Set(words(model))];
    const got=new Set(words(student));
    const hits=expected.filter(w=>got.has(w)).length;
    const coverage=expected.length?hits/expected.length:0;
    const lengthOk=words(student).length>=Math.min(8,Math.max(3,Math.round(expected.length*.35)));
    const pct=Math.min(100,Math.round((coverage*85)+(lengthOk?15:0)));
    return {pct,correct:pct>=60,hits,total:expected.length};
  };

  const sendViva=async(overrideText='')=>{
    const manualText=typeof overrideText==='string'?overrideText:'';
    const ans=(manualText||vivaIn).trim();
    if(!ans||vivaLoading||practiceDone)return;
    const keepScroll=studyScrollRef.current?.scrollTop??studyScrollTopRef.current;
    keepStudyScroll(keepScroll);
    setVivaIn('');
    const qs=practiceQs.length?practiceQs:makeSubjectiveQuestions(savedNotes.find(n=>n.id===selectedNoteId)||{topic,notes});
    const current=qs[practiceIdx]||qs[0]||{ans:'Review your notes and include the key terms.'};
    const mark=scoreSubjectiveAnswer(ans,current.ans);
    const nextIdx=practiceIdx+1;
    const next=qs[nextIdx];
    const nextResults=[...practiceResults,mark];
    const correctCount=nextResults.filter(r=>r.correct).length;
    const feedback=next
      ?`Score for this answer: ${mark.pct}% (${mark.correct?'Correct':'Needs more detail'}). Next question: ${next.q}`
      :`Score for this answer: ${mark.pct}% (${mark.correct?'Correct':'Needs more detail'}). Result: ${correctCount}/${qs.length} answers correct. Average: ${Math.round(nextResults.reduce((a,b)=>a+b.pct,0)/nextResults.length)}%. Practice complete.`;
    const nv=[...viva,{role:'student',text:ans,score:mark.pct,correct:mark.correct},{role:'examiner',text:feedback}];
    setViva(nv);
    setPracticeQs(qs);
    setPracticeResults(nextResults);
    setPracticeIdx(next?nextIdx:qs.length-1);
    setPracticeDone(!next);
    keepStudyScroll(keepScroll);
  };

  const toggleSpeechAnswer=async()=>{
    const keepScroll=studyScrollRef.current?.scrollTop??studyScrollTopRef.current;
    if(vivaLoading)return;
    const Rec=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!Rec){setSpeechSupported(false);showToast('Speech recognition is not supported in this browser','err');keepStudyScroll(keepScroll);return;}
    if(speechOn){
      speechManualStopRef.current=true;
      speechRef.current?.stop();
      keepStudyScroll(keepScroll);
      return;
    }
    speechBaseRef.current=vivaIn.trim();
    speechFinalRef.current='';
    speechInterimRef.current='';
    speechManualStopRef.current=false;
    const startRecognition=()=>{
      const rec=new Rec();
      speechRef.current=rec;
      rec.lang=(navigator.language&&navigator.language.startsWith('en'))?navigator.language:'en-US';
      rec.interimResults=true;
      rec.continuous=false;
      rec.maxAlternatives=3;
      rec.onaudiostart=()=>setSpeechStatus('Mic is listening...');
      rec.onspeechstart=()=>setSpeechStatus('Hearing your voice...');
      rec.onspeechend=()=>setSpeechStatus('Processing words...');
      rec.onstart=()=>{setSpeechOn(true);setSpeechStatus('Mic is listening...');keepStudyScroll(keepScroll);};
      rec.onerror=ev=>{
        if(ev.error==='not-allowed'){
          speechManualStopRef.current=true;
          setSpeechOn(false);
          setSpeechStatus('');
          showToast('Microphone permission was blocked','err');
          keepStudyScroll(keepScroll);
        }else if(ev.error==='no-speech'){
          setSpeechStatus('Listening... speak a little louder.');
        }
      };
      rec.onresult=ev=>{
        let finalText=speechFinalRef.current;
        let interim='';
        for(let i=ev.resultIndex;i<ev.results.length;i++){
          const txt=ev.results[i][0]?.transcript||'';
          if(ev.results[i].isFinal)finalText+=(finalText?' ':'')+txt.trim();
          else interim+=(interim?' ':'')+txt.trim();
        }
        speechFinalRef.current=finalText.trim();
        speechInterimRef.current=interim.trim();
        const base=speechBaseRef.current;
        const combined=[base,speechFinalRef.current,interim].filter(Boolean).join(' ').trim();
        updateVivaInputNow(combined);
        if(combined)setSpeechStatus('Writing your words...');
        keepStudyScroll(keepScroll);
      };
      rec.onend=()=>{
        if(!speechManualStopRef.current){
          setTimeout(()=>{if(!speechManualStopRef.current)startRecognition();},180);
          return;
        }
        setSpeechOn(false);
        setSpeechStatus('');
        keepStudyScroll(keepScroll);
        const spoken=[speechBaseRef.current,speechFinalRef.current,speechInterimRef.current].filter(Boolean).join(' ').trim();
        if(spoken)sendViva(spoken);
      };
      try{rec.start();}catch{setTimeout(()=>{if(!speechManualStopRef.current)startRecognition();},300);}
    };
    showToast('Listening... speak your answer');
    try{
      if(navigator.mediaDevices?.getUserMedia){
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        stream.getTracks().forEach(t=>t.stop());
      }
    }catch{}
    startRecognition();
    keepStudyScroll(keepScroll);
  };

  // ─── STUDY ───

            E('div',{style:{display:'flex',gap:8}},

            return E('div',{key:i,className:msg.role==='examiner'?'chat-ex':'chat-st',style:marked?{background:markPal.light,border:`2px solid ${markPal.dark}`}:{}},

            savedNotes.length>3&&E('div',{className:'scroll-hint'},'scroll for more'),
            E('button',{className:'btn btn-outline btn-sm',onClick:()=>setScreen('notes')},'Add Notes')

        ),
        savedNotes.length?E('div',{},
          E('div',{className:'doc-list',style:{display:'grid',gap:8,maxHeight:260,overflowY:'auto',padding:2,marginBottom:12}},
            savedNotes.map(n=>{
              const isSel=selectedNoteId===n.id;
              const words=(n.notes||'').split(/\s+/).filter(Boolean).length;

  const authSubmit=async(ev)=>{
    ev.preventDefault();
    const email=loginEmail.trim();
    const fallback=email.split('@')[0]||'Student';
    const name=(loginName.trim()||fallback).trim();
    const fb=initFirebase();
    if(!fb){setAuthStatus('Add Firebase config before login');showToast('Real login needs Firebase config first','err');return;}
    try{
      if(fb.auth.setPersistence)await fb.auth.setPersistence(window.firebase.auth.Auth.Persistence.LOCAL);
      setAuthStatus(loginSignup?'Creating account...':'Checking verified login...');
      const cred=loginSignup?await fb.auth.createUserWithEmailAndPassword(email,loginPassword):await fb.auth.signInWithEmailAndPassword(email,loginPassword);
      const user=cred.user;
      if(loginSignup&&user.updateProfile)await user.updateProfile({displayName:name});
      if(loginSignup&&user.sendEmailVerification){
        await user.sendEmailVerification();
        await fb.auth.signOut();
        setLoginSignup(false);
        setLoginPassword('');
        setAuthStatus('Verification email sent. Confirm it, then log in.');
        showToast('Check your inbox to verify email','ok');
        return;
      }
      const signedInUser=fb.auth.currentUser||user;
      await signedInUser.reload();
      await signedInUser.getIdToken(true);
      const freshUser=fb.auth.currentUser||signedInUser;
      if(!freshUser.emailVerified){
        if(freshUser.sendEmailVerification)await freshUser.sendEmailVerification();
        await fb.auth.signOut();
        setAuthStatus('Email not verified yet');
        showToast('Verify your real email before login','err');
        return;
      }
      const uid=freshUser.uid;
      localStorage.setItem('sb3_user',freshUser.displayName||name);
      localStorage.setItem('sb3_uid',uid);
      localStorage.setItem('sb3_auth_ok','1');
      localStorage.setItem('sb3_logged_in','1');
      if(loginRemember)localStorage.setItem('sb3_email',email);else localStorage.removeItem('sb3_email');
      setLoginName(freshUser.displayName||name);
      setAuthStatus('Firebase sync active');
      setEntryPhase('splashAfterLogin');
      loadUserState(uid);
    }catch(err){
      localStorage.removeItem('sb3_auth_ok');
      setAuthStatus(err.message||'Firebase auth failed');
      showToast(err.message||'Login failed','err');
    }
  };

    ['curious','👀','Curious','Curious mode. What are we learning next?']
  ];
  const CompanionControls=()=>E('div',{className:'companion-controls'},
    companionModes.map(([mode,icon,label,line])=>E('button',{key:mode,type:'button',className:`companion-control ${guideState.action===mode?'active':''}`,onClick:()=>runGuideActivity(mode,line,true)},`${icon} ${label}`))
  );
  // Ghost: edge-to-edge patrol with whoosh + double-click disappear.

  const triggerGhostBurst=()=>triggerGhostWhoosh('hide');
  const pauseGhost=()=>{const g=ghostRef.current;g.hovered=true;g.last=performance.now();};
  const resumeGhost=()=>{const g=ghostRef.current;g.hovered=false;g.last=performance.now();};
  const Ghost=()=>E('div',{
      className:`game-ghost ${(focusOn||screen==='focus'||companionsDocked)?'paused':''} ${ghostBurst?'burst-now':''} ${ghostHidden?'hidden':''} ${companionsDocked?'docked':''}`,
      ref:ghostElRef,
      onDoubleClick:()=>!companionsDocked&&triggerGhostBurst(),
      onMouseEnter:pauseGhost,
      onMouseLeave:resumeGhost
    },
    E('div',{className:'ghost-msg'},'I patrol the study zone.'),
    E('span',{className:'ghost-face',style:{transform:`scaleX(${-ghostDir})`}},
      Img({src:assets.ghost,cls:'ghost-img',alt:'ghost'})
    )
  );

  return E('div',{style:{display:'flex',minHeight:'calc(100vh - 72px)',width:'100%',background:'transparent'}},
    Img({src:themeFloorAsset,cls:'decor-clouds',alt:''}),
    // Desktop Sidebar
    E('div',{className:'sidebar'},
      E('div',{className:'s-titlebar'},E('span',{className:'s-dot'}),E('span',{className:'s-dot'}),E('span',{className:'s-dot'}),E('span',{className:'s-ttl'},'studybuddy.v3')),
      E('div',{className:'sidebar-brand'},
        E('h1',{},'StudyBuddy'),
        E('p',{},'AI Study Companion'),
        E('div',{className:'user-badge'},
          E('div',{className:'user-badge-initial'},profile.photo?E('img',{src:profile.photo,alt:'profile'}):(profile.displayName||loginName||'U').charAt(0).toUpperCase()),
          E('span',{className:'user-badge-name'},profile.displayName||loginName||'User'),
          E('button',{onClick:signOut,title:'Sign Out',style:{background:'none',border:'none',fontSize:14,color:'var(--mu)',flexShrink:0}},'⏻')
        )
      ),
      E('nav',{className:'sidebar-nav'},
        navItems.map(item=>E('button',{key:item.id,className:`snav-item${screen===item.id?' active':''}`,onClick:()=>goTo(item.id)},
          E('span',{className:'snav-icon'},Img({src:item.img,alt:item.label,style:{width:navIconSize,height:navIconSize,imageRendering:'pixelated'}})),
          E('span',{},item.label)
        ))
      ),
      E('div',{className:'sidebar-footer'},
        SettingsBtn(),
        E('div',{className:'api-alert'},
          E('p',{},'AI uses backend proxy. Keep API keys server-side.')
        )
      )
    ),
    // Main content
    E('div',{ref:mainRef,className:'main-content',onDragOver:ev=>ev.preventDefault(),onDrop:ev=>{ev.preventDefault();try{const d=JSON.parse(ev.dataTransfer.getData('text/plain'));if(d.src||d.emoji)addDecoration(d.name,d.src||d.emoji,'live');}catch{}}},
      Img({src:themeCornerAsset,cls:'decor-branch',alt:''}),
      E('div',{className:'app-decorations'},
        (prefs.decorations||[]).map(d=>E('div',{key:d.id,className:'decor-wrap',style:{left:`${d.x}%`,top:`${d.y}%`},onDoubleClick:()=>deleteDecoration(d.id)},
          d.emoji?E('span',{className:'deco-emoji',style:{'--s':`${d.size||54}px`},draggable:true,onDragEnd:ev=>moveDecoration(d.id,ev)},d.emoji):E('img',{src:d.src,alt:'',style:{'--s':`${d.size||54}px`},draggable:true,onDragEnd:ev=>moveDecoration(d.id,ev)}),
          E('button',{className:'decor-del',type:'button',onClick:()=>deleteDecoration(d.id)},'x')
        ))
      ),
      // Mobile topbar
      E('div',{className:'topbar'},
        screen!=='home'&&E('button',{className:'back-btn',onClick:()=>setScreen('home')},'‹'),
        E('h2',{},screenTitle[screen]||'StudyBuddy'),
        E('button',{onClick:openSettings,style:{background:'none',border:'none',cursor:'pointer',padding:'4px',display:'flex'}},Img({src:assets.settings,alt:'settings',style:{width:34,height:34,imageRendering:'pixelated'}}))
      ),
      !focusOn&&screen!=='break'&&E('button',{type:'button',className:'study-start-floating',onClick:startStudySession},
        Img({src:assets.headphones,alt:'start study'}),
        E('span',{},
          E('span',{className:'start-title'},'Start Study'),
          E('span',{className:'start-sub'},'Start timer')
        )
      ),
      focusOn&&E('button',{type:'button',className:'study-timer-floating',onClick:()=>setScreen('focus')},
        E('span',{className:'study-timer-label'},'Study'),
        E('span',{className:'study-timer-time'},fmtClock(focusSec))
      ),
      E('div',{className:'screen-wrap',onWheel:()=>{
        const now=Date.now();
        if(now-scrollGuideRef.current>1600&&guideState.action!=='wave'&&!focusOn&&screen!=='break'){
          scrollGuideRef.current=now;
          runGuideActivity('wave','',false);
        }
      }},
        ActiveScreen()
      ),
      Guide(),
      Ghost(),
      E('button',{className:'companion-toggle',onClick:()=>setCompanionsDocked(v=>!v),title:companionsDocked?'Resume moving characters':'Dock moving characters'},
        companionsDocked?'Resume':'Focus'
      )
    ),
    // Mobile bottom nav
    E('div',{className:'bottom-nav'},
      E('div',{className:'bnav-grid'},
        navItems.map(item=>E('button',{key:item.id,className:`bnav-item${screen===item.id?' active':''}`,onClick:()=>goTo(item.id)},
          E('div',{className:'bnav-icon'},Img({src:item.img,alt:item.label,style:{width:Math.min(54,navIconSize+10),height:Math.min(54,navIconSize+10),imageRendering:'pixelated'}})),
          E('span',{className:'bnav-label'},item.label)
        ))
      )
    ),
    // Modals & toasts
    showApiModal&&ApiModal(),
    toast&&E('div',{className:`toast toast-${toast.type}`},toast.msg)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(E(App));
</script>
</body>
</html>
