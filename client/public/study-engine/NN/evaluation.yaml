# configs/evaluation.yaml
# RoBERTa-base regression head for answer evaluation scoring

model:
  # base_model: "roberta-base"
  base_model: "roberta-base"
  hidden_dropout_prob: 0.1
  num_labels: 1                              # regression output (0-100 pct score)
  pooling: "cls"                             # use [CLS] token

training:
  output_dir: "outputs/evaluator"
  num_train_epochs: 8
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2            # effective batch = 32
  learning_rate: 2.0e-5
  lr_scheduler_type: "linear"
  warmup_ratio: 0.06
  weight_decay: 0.01
  fp16: false
  bf16: false
  max_grad_norm: 1.0
  eval_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "pearson_r"
  greater_is_better: true
  logging_steps: 50
  save_total_limit: 3
  report_to: "none"
  seed: 42
  dataloader_num_workers: 4

data:
  train_file: "data/eval/evaluator_train.jsonl"
  val_file: "data/eval/evaluator_val.jsonl"
  max_input_length: 512                      # question + reference + student answer
  input_template: |
    Question: {question}
    Reference: {reference_answer}
    Student: {student_answer}
    Rubric: {rubric_str}

  score_normalization:
    min: 0
    max: 100                                 # all scores normalized to 0-1 for training

scoring:
  band_thresholds:
    weak: 40
    partial: 60
    good: 80
    strong: 100

output:
  push_to_hub: false
  hub_model_id: ""

early_stopping:
  patience: 4
